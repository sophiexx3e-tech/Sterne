<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSFiddle ksfr4axg</title>

  <style>
    body {
    text-align: center;
    background-color: #1a1a1a;
    color: #fff;
    font-family: Arial, sans-serif;
}

canvas {
    background-color: #000;
    display: block;
    margin: 20px auto;
    border: 2px solid #fff;
}
  </style>

  
</head>
<body>
  <h1>Sternefänger</h1>
<p>Punkte: <span id="score">0</span></p>
<canvas id="gameCanvas" width="500" height="400"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const player = { x: canvas.width/2-20, y: canvas.height-30, width:40, height:10, speed:5 };
let stars = [];
let score = 0;
const scoreEl = document.getElementById("score");

// Steuerung
const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Touchsteuerung für iPad
canvas.addEventListener("touchstart", function(e){
    const touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
    if(touchX < canvas.width/2) {
        keys["ArrowLeft"] = true;
    } else {
        keys["ArrowRight"] = true;
    }
});
canvas.addEventListener("touchend", function(e){
    keys["ArrowLeft"] = false;
    keys["ArrowRight"] = false;
});

// Sterne erzeugen
function spawnStar() {
    const x = Math.random()*(canvas.width-10);
    stars.push({x:x, y:0, size:10});
}
setInterval(spawnStar, 1000);

// Zeichnen
function drawPlayer(){ 
    ctx.fillStyle="#00ff00"; 
    ctx.fillRect(player.x, player.y, player.width, player.height); 
}

function drawStars(){ 
    ctx.fillStyle="#ffff00"; 
    stars.forEach(star=>ctx.fillRect(star.x, star.y, star.size, star.size)); 
}

function movePlayer() {
    if(keys["ArrowLeft"] && player.x>0) player.x-=player.speed;
    if(keys["ArrowRight"] && player.x+player.width<canvas.width) player.x+=player.speed;
}

function moveStars() {
    stars.forEach(star=>star.y+=3);
    stars=stars.filter(star=>{
        if(star.y+star.size>=player.y && star.x+star.size>=player.x && star.x<=player.x+player.width){
            score++;
            scoreEl.textContent=score;
            return false;
        }
        return star.y<canvas.height;
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawPlayer();
    drawStars();
    movePlayer();
    moveStars();
    requestAnimationFrame(draw);
}

draw();
  </script>
</body>
</html>
